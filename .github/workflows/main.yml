name: Android CI

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 11
      uses: actions/setup-java@v4
      with:
        java-version: '11'
        distribution: 'temurin'

    - name: Build with Gradle
      run: |
        cd PROFESSOR
        gradle build

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: Professor-APK
        path: 'PROFESSOR/app/build/outputs/apk/debug/*.apk'
